<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nobelian Admin - Product Editor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/admin.css">

<script defer src="js/auth.js"></script>
</head>

<body>

<div class="admin-layout">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="sidebar-logo">
<h2>Nobelian</h2>
<p>Admin</p>
</div>

<nav class="sidebar-nav">

<a href="/dashboard.html" class="nav-item">
Dashboard
</a>

<a href="/products.html" class="nav-item active">
Products
</a>

<a href="/collections.html" class="nav-item">
Collections
</a>

<a href="/media.html" class="nav-item">
Media
</a>

</nav>

<div class="sidebar-footer">
<button id="logoutButton" class="logout-button">Logout</button>
</div>

</aside>


<!-- MAIN CONTENT -->

<div class="main-content">

<header class="topbar">
<h1 id="pageTitle">New Product</h1>
</header>


<section class="product-editor">

<form id="productForm">

<div class="form-group">
<label>Product Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Price (€)</label>
<input type="number" id="price" required>
</div>

<div class="form-group">
<label>Collection</label>
<input type="text" id="collection">
</div>

<div class="form-group">
<label>Image URL</label>
<input type="text" id="image">
</div>

<div class="form-group">
<label>Description</label>
<textarea id="description" rows="5"></textarea>
</div>

<div class="form-actions">

<button type="submit" class="save-button">
Save Product
</button>

<a href="/products.html" class="cancel-button">
Cancel
</a>

</div>

</form>

</section>

</div>

</div>


<script>

const token = localStorage.getItem("admin_token");

if(!token){
window.location.href="/login.html";
}


const params = new URLSearchParams(window.location.search);
const productId = params.get("id");


if(productId){
document.getElementById("pageTitle").innerText="Edit Product";
loadProduct();
}


async function loadProduct(){

try{

const res = await fetch(`https://api.nobelian.com/products/${productId}`,{
headers:{
Authorization:`Bearer ${token}`
}
});

const product = await res.json();

document.getElementById("name").value = product.name;
document.getElementById("price").value = product.price;
document.getElementById("collection").value = product.collection || "";
document.getElementById("image").value = product.image || "";
document.getElementById("description").value = product.description || "";

}catch(err){

console.error("Load product error:",err);

}

}



document.getElementById("productForm").addEventListener("submit", async function(e){

e.preventDefault();

const productData = {

name: document.getElementById("name").value,
price: document.getElementById("price").value,
collection: document.getElementById("collection").value,
image: document.getElementById("image").value,
description: document.getElementById("description").value

};


try{

if(productId){

await fetch(`https://api.nobelian.com/products/${productId}`,{

method:"PUT",

headers:{
"Content-Type":"application/json",
Authorization:`Bearer ${token}`
},

body: JSON.stringify(productData)

});

}else{

await fetch("https://api.nobelian.com/products",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:`Bearer ${token}`
},

body: JSON.stringify(productData)

});

}


window.location.href="/products.html";

}catch(err){

console.error("Save product error:",err);

}

});



document.getElementById("logoutButton").addEventListener("click",()=>{

localStorage.removeItem("admin_token");

window.location.href="/login.html";

});

</script>

</body>
</html>
